<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Parish Records Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>

<div id="controls" class="collapsed">
  <div id="controls-header">
    <span id="title">Filters</span>
    <div>
      <button id="langToggle">🌐</button>
      <button id="toggleControls">▼</button>
    </div>
  </div>

  <div id="controls-body">

    <div class="control-row">
      <label id="yearLabel"></label>
      <span><strong id="yearValue"></strong></span>
      <input type="range" id="yearSlider" min="1700" max="1950" />
    </div>

    <div class="control-row">
      <label id="typeLabel"></label>
      <select id="recordType"></select>
    </div>

    <div class="control-row">
      <label id="regionsLabel"></label>
      <div id="regionList"></div>
    </div>

    <div id="legend"></div>

  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
